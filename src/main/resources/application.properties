spring.application.name=api-gateway

server.port=8080

#Config de Eureka:
eureka.client.service-url.defaultZone=http://localhost:8090/eureka/

#La visualización del registro de eureka debería quedar en false (no visible).
eureka.client.register-with-eureka=true

#La visualización del registro de eureka debería quedar en false (no visible).
eureka.client.fetch-registry=true

eureka.instance.prefer-ip-address=true


#Ruta para microservicios:
#Ruta MS User:
spring.cloud.gateway.server.webflux.routes[0].id=LMUserMS
spring.cloud.gateway.server.webflux.routes[0].uri=lb://LMUserMS
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/v1/usuarios/**,/api/v1/roles/**

#Ruta MS Customer:
spring.cloud.gateway.server.webflux.routes[1].id=LMCustomerMS
spring.cloud.gateway.server.webflux.routes[1].uri=lb://LMCustomerMS
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/v1/clientes/**,/api/v1/direcciones/**

#Ruta MS Catalog:
spring.cloud.gateway.server.webflux.routes[2].id=LMCatalogMS
spring.cloud.gateway.server.webflux.routes[2].uri=lb://LMCatalogMS
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/v1/productos/**,/api/v1/proveedores/**,/api/v2/productos/**,/api/v2/proveedores/**

#Ruta MS Order:
spring.cloud.gateway.server.webflux.routes[3].id=LMOrderMS
spring.cloud.gateway.server.webflux.routes[3].uri=lb://LMOrderMS
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/v1/pedidos/**

#Ruta MS Stock:
spring.cloud.gateway.server.webflux.routes[4].id=LMStockMS
spring.cloud.gateway.server.webflux.routes[4].uri=lb://LMStockMS
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/api/v1/inventarios/**,/api/v2/inventarios/**

#Ruta MS Cart:
spring.cloud.gateway.server.webflux.routes[5].id=LMCartMS
spring.cloud.gateway.server.webflux.routes[5].uri=lb://LMCartMS
spring.cloud.gateway.server.webflux.routes[5].predicates[0]=Path=/api/v1/carritos/**

#Ruta MS Sell:
spring.cloud.gateway.server.webflux.routes[6].id=LMSellMS
spring.cloud.gateway.server.webflux.routes[6].uri=lb://LMSellMS
spring.cloud.gateway.server.webflux.routes[6].predicates[0]=Path=/api/v1/descuentos/**,/api/v1/ventas/**

#Ruta MS Payment:
spring.cloud.gateway.server.webflux.routes[7].id=LibreriaMaketPaymentMS
spring.cloud.gateway.server.webflux.routes[7].uri=lb://LibreriaMaketPaymentMS
spring.cloud.gateway.server.webflux.routes[7].predicates[0]=Path=/api/v1/pagos/**,/api/v1/metodos-de-pago/**
