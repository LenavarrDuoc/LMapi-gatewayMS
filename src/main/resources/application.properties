## ahora, se debe configurar OpenFEIGN en cada microservicio para dejar solo el nombre del servicio tal cual como lo está manejando Eureka.
# Así, OpenFEIGN buscará los MS no por ruta, sino por el nombre del MS que está registrado en Eureka.
#El nombre de cada MS es el que está indicado en application.properties de cada MS.

#CONFIGURACIÓN DE DOCUMENTACÍÓN:
#SWAGGER:
springdoc.swagger-ui.path=/swagger-ui.html

#Las siguientes dos opciones son para que busque los informes mediante Eureka
#si es que no las definimos manualmente como abajo
#springdoc.enable-native-support=true
#springdoc.swagger-ui.show-common-extensions=true


springdoc.swagger-ui.urls[0].name=LMCustomerMS
